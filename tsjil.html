<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل مصروفات البنزين</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .pin-dots {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 10px 0;
        }
        .pin-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #e2e8f0;
            transition: all 0.3s;
        }
        .pin-dot.filled {
            background: #4f46e5;
            transform: scale(1.1);
        }
        .pin-input {
            letter-spacing: 8px;
            font-size: 20px;
            text-align: center;
            font-weight: bold;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .shake {
            animation: shake 0.5s ease-in-out;
        }
        .car-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }
        .car-option:hover {
            border-color: #818cf8;
            background: #f8fafc;
        }
        .car-option.selected {
            border-color: #4f46e5;
            background: #eef2ff;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }
        .car-option input[type="radio"] {
            display: none;
        }
        .car-option .car-icon {
            font-size: 20px;
            color: #4f46e5;
        }
        .car-option .car-details {
            flex: 1;
        }
        .car-option .car-details .car-name {
            font-weight: bold;
            font-size: 14px;
            color: #1e293b;
        }
        .car-option .car-details .car-info {
            font-size: 12px;
            color: #64748b;
        }
        .fuel-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }
        .fuel-95 { background: #fecaca; color: #991b1b; }
        .fuel-91 { background: #bbf7d0; color: #166534; }
        .fuel-98 { background: #bfdbfe; color: #1e40af; }
        
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #e2e8f0;
            border-radius: 50%;
            border-top-color: #4f46e5;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <div class="gradient-bg rounded-2xl shadow-2xl p-6 text-white mb-6 text-center">
            <i class="fa-solid fa-gas-pump text-4xl mb-2 block text-amber-300"></i>
            <h1 class="text-2xl font-bold">تسجيل مصروفات البنزين</h1>
            <p class="text-white/80 text-sm">اختر اسمك من القائمة وأدخل الرقم السري لتسجيل التعبئة</p>
        </div>

        <!-- نموذج الإدخال -->
        <div class="bg-white rounded-2xl shadow-xl border border-slate-100 p-6 md:p-8">
            
            <!-- اختيار الشخص -->
            <div class="mb-6">
                <label class="block text-sm font-bold text-slate-700 mb-2">
                    <i class="fa-solid fa-user text-indigo-500"></i> اختر الاسم من القائمة
                </label>
                <select id="personSelect" class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all outline-none bg-white">
                    <option value="">-- جاري تحميل الأسماء المسجلة... --</option>
                </select>
                <div id="loadingIndicator" class="text-center text-sm text-slate-400 mt-2 hidden">
                    <span class="loading-spinner"></span> جاري جلب البيانات...
                </div>
            </div>

            <!-- معلومات الشخص المختارة -->
            <div id="personInfo" class="hidden bg-slate-50 p-4 rounded-xl border border-slate-200 mb-6">
                <div class="text-sm">
                    <div class="flex items-center gap-2 mb-2">
                        <i class="fa-solid fa-user text-indigo-500"></i>
                        <span class="font-bold text-slate-700" id="displayName">-</span>
                    </div>
                    <div class="text-xs text-slate-500">
                        <span id="displayCarsCount">0</span> سيارات مسجلة
                    </div>
                </div>
            </div>

            <!-- نموذج الرقم السري -->
            <div id="pinSection" class="hidden mb-6">
                <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-200">
                    <label class="block text-sm font-bold text-slate-700 mb-3 text-center">
                        <i class="fa-solid fa-lock text-indigo-500"></i> أدخل الرقم السري
                    </label>
                    
                    <div class="pin-dots" id="pinDots">
                        <span class="pin-dot" data-index="0"></span>
                        <span class="pin-dot" data-index="1"></span>
                        <span class="pin-dot" data-index="2"></span>
                        <span class="pin-dot" data-index="3"></span>
                        <span class="pin-dot hidden" data-index="4"></span>
                        <span class="pin-dot hidden" data-index="5"></span>
                        <span class="pin-dot hidden" data-index="6"></span>
                        <span class="pin-dot hidden" data-index="7"></span>
                    </div>
                    
                    <input type="password" id="pinInput" maxlength="8" 
                        class="pin-input w-full px-4 py-3 border-2 border-indigo-300 rounded-xl focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all outline-none bg-white"
                        placeholder="••••">
                    
                    <div class="flex justify-between mt-2">
                        <span id="pinStatus" class="text-xs text-slate-500">أدخل الرقم السري (4-8 أرقام) ثم اضغط Enter</span>
                        <button type="button" onclick="clearPin()" class="text-xs text-red-500 hover:text-red-700">
                            <i class="fa-solid fa-eraser"></i> مسح
                        </button>
                    </div>
                    <div id="pinError" class="text-xs text-red-500 mt-2 hidden text-center">
                        <i class="fa-solid fa-exclamation-circle"></i>
                        <span id="pinErrorMessage">الرقم السري غير صحيح</span>
                    </div>
                    <div id="pinSuccess" class="text-xs text-green-600 mt-2 hidden text-center">
                        <i class="fa-solid fa-check-circle"></i>
                        <span>✅ تم التحقق من الرقم السري بنجاح</span>
                    </div>
                </div>
            </div>

            <!-- اختيار السيارة -->
            <div id="carSelection" class="hidden mb-6">
                <label class="block text-sm font-bold text-slate-700 mb-2">
                    <i class="fa-solid fa-car text-indigo-500"></i> اختر السيارة
                </label>
                <div id="carsList" class="space-y-2">
                    <!-- سيتم ملؤها بواسطة JavaScript -->
                </div>
            </div>

            <!-- نموذج تسجيل المصروف -->
            <div id="expenseForm" class="hidden relative">
                <div class="space-y-4">
                    <h3 class="text-lg font-bold border-b pb-2 border-slate-200 text-slate-700">
                        <i class="fa-solid fa-pen-to-square text-indigo-500"></i> تسجيل التعبئة
                    </h3>

                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-600">المبلغ (ريال):</label>
                        <input type="number" id="amount" placeholder="0.00" step="0.01" required 
                            class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-600">عدد اللترات (محسوب تلقائياً):</label>
                        <input type="text" id="litersDisplay" readonly 
                            class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl bg-slate-50 text-slate-700 font-bold">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-600">قراءة العداد (كم):</label>
                        <input type="number" id="odometer" placeholder="اختياري" 
                            class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-600">التاريخ والوقت:</label>
                        <input type="datetime-local" id="datetime" 
                            class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all outline-none">
                    </div>

                    <button onclick="saveExpense()" 
                        class="w-full bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-700 hover:to-indigo-800 text-white font-bold py-3 px-6 rounded-xl shadow-lg hover:shadow-xl transition-all duration-200">
                        <i class="fa-solid fa-floppy-disk ml-2"></i> حفظ التعبئة
                    </button>
                </div>
            </div>

            <!-- رسالة النجاح -->
            <div id="successMessage" class="mt-4 hidden">
                <div class="bg-green-50 border-r-4 border-green-500 p-4 rounded-xl">
                    <div class="flex items-center">
                        <div class="flex-shrink-0">
                            <i class="fa-solid fa-check-circle text-green-500 text-xl"></i>
                        </div>
                        <div class="mr-3">
                            <p class="text-sm text-green-700 font-medium">تم تسجيل التعبئة بنجاح!</p>
                            <p class="text-xs text-green-600 mt-1">تم حفظ البيانات في قاعدة البيانات</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // إعدادات Firebase
        const firebaseConfig = {
            databaseURL: "https://hsabat-a4353-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const bnzimRef = database.ref('bnzim');

        // متغيرات عامة
        let selectedPerson = null;
        let personData = null;
        let selectedCar = null;
        let pinAttempts = 0;
        let isPinVerified = false;
        const MAX_PIN_ATTEMPTS = 3;
        const PIN_LOCK_DURATION = 3000;

        // تعيين الوقت الحالي
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('datetime').value = now.toISOString().slice(0, 16);

        // تحميل القائمة من مسار bnzim مباشرة وبناء هيكلة البيانات تلقائياً
        function loadUsersFromBnzim() {
            const select = document.getElementById('personSelect');
            const loadingIndicator = document.getElementById('loadingIndicator');
            
            select.innerHTML = '<option value="">-- اختر الاسم من القائمة --</option>';
            loadingIndicator.classList.remove('hidden');

            bnzimRef.once('value').then((snapshot) => {
                loadingIndicator.classList.add('hidden');
                
                if (!snapshot.exists()) {
                    select.innerHTML = '<option value="" disabled>⚠️ لا يوجد مستخدمين مسجلين في قاعدة البيانات</option>';
                    return;
                }

                const names = [];
                snapshot.forEach((childSnapshot) => {
                    names.push(childSnapshot.key);
                });

                // ترتيب الأسماء أبجدياً
                names.sort((a, b) => a.localeCompare(b));

                names.forEach((name) => {
                    const option = document.createElement('option');
                    option.value = name;
                    option.textContent = name;
                    select.appendChild(option);
                });

                console.log(`✅ تم تحميل ${names.length} اسم من مسار bnzim بنجاح.`);
                
            }).catch((error) => {
                console.error('❌ خطأ في تحميل القائمة:', error);
                loadingIndicator.classList.add('hidden');
                select.innerHTML = '<option value="" disabled>⚠️ حدث خطأ أثناء جلب القائمة</option>';
            });
        }

        // الاستماع لحدث تغيير الخيار من القائمة المنسدلة
        document.getElementById('personSelect').addEventListener('change', function() {
            const userName = this.value;
            if (!userName) {
                resetAll();
                return;
            }

            fetchUserDataFromBnzim(userName);
        });

        // جلب تفاصيل السيارات والرقم السري للاسم المختار
        function fetchUserDataFromBnzim(userName) {
            bnzimRef.child(userName).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    let cars = [];
                    let pin = '';
                    
                    snapshot.forEach((recordSnapshot) => {
                        const data = recordSnapshot.val();
                        
                        // استخراج مصفوفة السيارات إذا وجدت
                        if (data.cars && Array.isArray(data.cars) && data.cars.length > 0) {
                            cars = data.cars;
                        } else if (data.car && data.model) {
                            // إذا كانت البيانات مسجلة بشكل حقول منفصلة، نقوم بجمعها
                            const fuelType = data.fuelType || '91';
                            const isCarExists = cars.some(c => c.type === data.car && c.model === data.model);
                            if (!isCarExists) {
                                cars.push({
                                    type: data.car,
                                    model: data.model,
                                    fuelType: fuelType
                                });
                            }
                        }
                        
                        if (data.pin) {
                            pin = data.pin;
                        }
                    });

                    // افتراضي في حال لم يتم العثور على سيارات مسجلة
                    if (cars.length === 0) {
                        cars = [{
                            type: 'سيارة غير محددة',
                            model: 'غير محدد',
                            fuelType: '91'
                        }];
                    }

                    personData = { cars, pin };
                    selectedPerson = userName;
                    
                    // تحضير واجهة الإدخال
                    document.getElementById('pinSection').classList.remove('hidden');
                    document.getElementById('pinInput').focus();
                    document.getElementById('pinInput').value = '';
                    updatePinDots('');
                    document.getElementById('pinError').classList.add('hidden');
                    document.getElementById('pinSuccess').classList.add('hidden');
                    document.getElementById('expenseForm').classList.add('hidden');
                    pinAttempts = 0;
                    document.getElementById('pinInput').disabled = false;
                    document.getElementById('pinInput').classList.remove('opacity-50');
                    document.getElementById('pinStatus').textContent = 'أدخل الرقم السري (4-8 أرقام) ثم اضغط Enter';
                    document.getElementById('pinStatus').className = 'text-xs text-slate-500';
                    
                    // عرض البطاقة التعريفية والسيارات
                    document.getElementById('displayName').textContent = selectedPerson;
                    document.getElementById('displayCarsCount').textContent = cars.length;
                    document.getElementById('personInfo').classList.remove('hidden');
                    
                    renderCars(cars);
                    document.getElementById('carSelection').classList.remove('hidden');
                } else {
                    alert('⚠️ لم يتم العثور على تفاصيل لهذا الشخص');
                    resetAll();
                }
            }).catch((error) => {
                console.error('❌ خطأ:', error);
                alert('حدث خطأ في جلب تفاصيل الاسم: ' + error.message);
            });
        }

        function renderCars(cars) {
            const container = document.getElementById('carsList');
            container.innerHTML = '';
            
            const fuelNames = { '95': 'أحمر', '91': 'أخضر', '98': 'أزرق' };
            const fuelColors = { '95': 'fuel-95', '91': 'fuel-91', '98': 'fuel-98' };

            cars.forEach((car, index) => {
                const div = document.createElement('div');
                div.className = 'car-option';
                div.onclick = () => selectCar(index);
                
                const fuelType = car.fuelType || '91';
                div.innerHTML = `
                    <input type="radio" name="selectedCar" value="${index}" id="car_${index}">
                    <div class="car-icon">
                        <i class="fa-solid fa-car"></i>
                    </div>
                    <div class="car-details">
                        <div class="car-name">${car.type || 'غير محدد'}</div>
                        <div class="car-info">
                            <span>موديل ${car.model || 'غير محدد'}</span>
                            <span class="fuel-badge ${fuelColors[fuelType]}">${fuelNames[fuelType]} (${fuelType})</span>
                        </div>
                    </div>
                    <div class="text-xs text-slate-400">
                        <i class="fa-regular fa-circle"></i>
                    </div>
                `;
                container.appendChild(div);
            });
            
            if (cars.length > 0) {
                selectCar(0);
            }
        }

        function selectCar(index) {
            const carOptions = document.querySelectorAll('.car-option');
            carOptions.forEach((el, i) => {
                if (i === index) {
                    el.classList.add('selected');
                    const icon = el.querySelector('.fa-regular');
                    if (icon) icon.className = 'fa-regular fa-circle-check text-indigo-500';
                } else {
                    el.classList.remove('selected');
                    const icon = el.querySelector('.fa-regular');
                    if (icon) icon.className = 'fa-regular fa-circle text-slate-400';
                }
            });
            selectedCar = index;
            calculateLiters();
        }

        document.getElementById('pinInput').addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '');
            updatePinDots(this.value);
            document.getElementById('pinError').classList.add('hidden');
            document.getElementById('pinSuccess').classList.add('hidden');
            document.getElementById('expenseForm').classList.add('hidden');
            
            if (this.value.length > 0) {
                document.getElementById('pinStatus').textContent = `جاري الكتابة (${this.value.length}/4-8)`;
                document.getElementById('pinStatus').className = 'text-xs text-indigo-600';
            } else {
                document.getElementById('pinStatus').textContent = 'أدخل الرقم السري (4-8 أرقام) ثم اضغط Enter';
                document.getElementById('pinStatus').className = 'text-xs text-slate-500';
            }
        });

        document.getElementById('pinInput').addEventListener('paste', e => e.preventDefault());

        function updatePinDots(pin) {
            const dots = document.querySelectorAll('.pin-dot');
            const length = pin.length;
            dots.forEach((dot, index) => {
                if (index < length) dot.classList.add('filled');
                else dot.classList.remove('filled');
            });
        }

        function verifyPin(pin) {
            if (!personData || !personData.pin) {
                document.getElementById('pinError').classList.remove('hidden');
                document.getElementById('pinErrorMessage').textContent = 'لم يتم تعيين رقم سري لهذا الحساب';
                return;
            }

            if (pin === personData.pin) {
                isPinVerified = true;
                document.getElementById('pinError').classList.add('hidden');
                document.getElementById('pinSuccess').classList.remove('hidden');
                document.getElementById('expenseForm').classList.remove('hidden');
                document.getElementById('pinStatus').textContent = '✅ تم التحقق من الرقم السري';
                document.getElementById('pinStatus').className = 'text-xs text-green-600';
                pinAttempts = 0;
                document.getElementById('amount').focus();
            } else {
                isPinVerified = false;
                pinAttempts++;
                const remaining = MAX_PIN_ATTEMPTS - pinAttempts;
                
                document.getElementById('pinError').classList.remove('hidden');
                document.getElementById('pinErrorMessage').textContent = `الرقم السري غير صحيح (${remaining} محاولات متبقية)`;
                document.getElementById('pinStatus').textContent = '❌ رقم سري خاطئ';
                document.getElementById('pinStatus').className = 'text-xs text-red-600';
                
                document.getElementById('pinInput').classList.add('shake');
                setTimeout(() => document.getElementById('pinInput').classList.remove('shake'), 500);
                
                if (pinAttempts >= MAX_PIN_ATTEMPTS) {
                    document.getElementById('pinErrorMessage').textContent = `⚠️ تم القفل المحتوم. انتظر ${PIN_LOCK_DURATION/1000} ثواني`;
                    document.getElementById('pinInput').disabled = true;
                    document.getElementById('pinInput').classList.add('opacity-50');
                    setTimeout(() => {
                        document.getElementById('pinInput').disabled = false;
                        document.getElementById('pinInput').classList.remove('opacity-50');
                        document.getElementById('pinInput').value = '';
                        updatePinDots('');
                        pinAttempts = 0;
                        document.getElementById('pinError').classList.add('hidden');
                        document.getElementById('pinStatus').textContent = 'أدخل الرقم السري ثم اضغط Enter';
                        document.getElementById('pinStatus').className = 'text-xs text-slate-500';
                        document.getElementById('pinInput').focus();
                    }, PIN_LOCK_DURATION);
                }
            }
        }

        function clearPin() {
            document.getElementById('pinInput').value = '';
            updatePinDots('');
            document.getElementById('pinError').classList.add('hidden');
            document.getElementById('pinSuccess').classList.add('hidden');
            document.getElementById('expenseForm').classList.add('hidden');
            document.getElementById('pinInput').focus();
            isPinVerified = false;
        }

        function calculateLiters() {
            const amount = parseFloat(document.getElementById('amount').value);
            let fuelType = '91';
            if (personData && personData.cars && selectedCar !== null && personData.cars[selectedCar]) {
                fuelType = personData.cars[selectedCar].fuelType || '91';
            }
            
            let pricePerLiter = 0;
            if (fuelType === '95') pricePerLiter = 2.33;
            else if (fuelType === '91') pricePerLiter = 2.18;
            else if (fuelType === '98') pricePerLiter = 4.51;
            
            if (!isNaN(amount) && amount > 0 && pricePerLiter > 0) {
                const liters = amount / pricePerLiter;
                document.getElementById('litersDisplay').value = liters.toFixed(2) + ' لتر';
            } else {
                document.getElementById('litersDisplay').value = '';
            }
        }

        document.getElementById('amount').addEventListener('input', calculateLiters);

        document.getElementById('pinInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const pin = this.value;
                if (pin.length >= 4 && pin.length <= 8) {
                    verifyPin(pin);
                } else {
                    document.getElementById('pinError').classList.remove('hidden');
                    document.getElementById('pinErrorMessage').textContent = `الرجاء إدخال من 4 إلى 8 أرقام`;
                }
            }
        });

        function saveExpense() {
            if (!isPinVerified || !selectedPerson || selectedCar === null) {
                alert('⚠️ يرجى التحقق من الرقم السري واختيار السيارة');
                return;
            }

            const amount = document.getElementById('amount').value.trim();
            const odometer = document.getElementById('odometer').value.trim() || 'غير محدد';
            const datetime = document.getElementById('datetime').value;

            if (!amount || parseFloat(amount) <= 0) {
                alert('الرجاء إدخال مبلغ صحيح');
                document.getElementById('amount').focus();
                return;
            }

            const selectedCarData = personData.cars[selectedCar];
            const fuelType = selectedCarData.fuelType || '91';
            
            let pricePerLiter = 0, fuelName = '';
            if (fuelType === '95') { pricePerLiter = 2.33; fuelName = 'أحمر (95)'; }
            else if (fuelType === '91') { pricePerLiter = 2.18; fuelName = 'أخضر (91)'; }
            else if (fuelType === '98') { pricePerLiter = 4.51; fuelName = 'أزرق (98)'; }
            
            const liters = parseFloat(amount) / pricePerLiter;

            const newRecordRef = bnzimRef.child(selectedPerson).push();
            newRecordRef.set({
                amount: parseFloat(amount),
                fuelType: fuelType,
                fuelName: fuelName,
                pricePerLiter: pricePerLiter,
                liters: liters,
                odometer: odometer,
                timestamp: datetime,
                car: selectedCarData.type || 'غير محدد',
                model: selectedCarData.model || 'غير محدد',
                carIndex: selectedCar,
                createdAt: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                document.getElementById('successMessage').classList.remove('hidden');
                setTimeout(() => document.getElementById('successMessage').classList.add('hidden'), 5000);

                document.getElementById('amount').value = '';
                document.getElementById('odometer').value = '';
                document.getElementById('litersDisplay').value = '';
                clearPin();
                document.getElementById('personSelect').value = '';
                resetAll();
                
                alert('✅ تم حفظ تعبئة الوقود بنجاح!');
            }).catch((error) => {
                alert('حدث خطأ أثناء الحفظ: ' + error.message);
            });
        }

        function resetAll() {
            document.getElementById('pinSection').classList.add('hidden');
            document.getElementById('personInfo').classList.add('hidden');
            document.getElementById('carSelection').classList.add('hidden');
            document.getElementById('expenseForm').classList.add('hidden');
            document.getElementById('pinError').classList.add('hidden');
            document.getElementById('pinSuccess').classList.add('hidden');
            document.getElementById('pinInput').value = '';
            updatePinDots('');
            pinAttempts = 0;
            isPinVerified = false;
            selectedPerson = null;
            personData = null;
            selectedCar = null;
        }

        // تحميل القائمة فور فتح الصفحة
        loadUsersFromBnzim();

        document.getElementById('amount').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('odometer').focus();
        });

        document.getElementById('odometer').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') saveExpense();
        });
    </script>
</body>
</html>
