<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطاقات مصروفات البنزين</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <nav class="bg-gradient-to-r from-indigo-700 to-violet-800 text-white shadow-lg sticky top-0 z-50 mb-8">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3 space-x-reverse">
                <i class="fa-solid fa-id-card text-2xl text-amber-400"></i>
                <h1 class="text-xl font-black">بطاقات مصروفات البنزين لكل شخص</h1>
            </div>
            <span class="text-xs bg-white/20 px-3 py-1 rounded-full border border-white/10 backdrop-blur-md font-medium">تحديث فوري ⚡</span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 pb-12 space-y-6">

        <div class="bg-white p-4 rounded-2xl shadow-xs border border-slate-200/60 max-w-md mx-auto">
            <div class="relative">
                <i class="fa-solid fa-filter absolute right-3 top-3.5 text-slate-400"></i>
                <input type="text" id="searchBox" oninput="renderCards()" placeholder="ابحث عن شخص محدد..." 
                    class="w-full pl-3 pr-9 py-2 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
        </div>

        <div id="cardsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-12 text-slate-400 font-medium">
                <i class="fa-solid fa-circle-notch animate-spin text-indigo-600 text-2xl mb-3 block"></i>
                جاري تجميع البيانات وتجهيز البطاقات الخاصة...
            </div>
        </div>

    </main>

    <script>
        // 1. ربط إعدادات Firebase
        const firebaseConfig = {
            databaseURL: "https://hsabat-a4353-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const bnzimRef = database.ref('bnzim');

        let structuredData = {}; // { "اسم الشخص": { car, model, records: [...] } }

        // الاستماع الفوري لقاعدة البيانات
        bnzimRef.on('value', (snapshot) => {
            structuredData = {};

            if (!snapshot.exists()) {
                document.getElementById('cardsGrid').innerHTML = `
                    <div class="col-span-full text-center py-12 bg-white rounded-2xl border border-slate-200 text-slate-400">
                        <i class="fa-solid fa-folder-open text-3xl mb-2 block text-slate-300"></i> لا توجد بيانات مسجلة حالياً في النظام.
                    </div>`;
                return;
            }

            // معالجة البيانات: استخراج السيارة والموديل من أول سجل إن وجد
            snapshot.forEach((userSnapshot) => {
                const userName = userSnapshot.key;
                let car = "غير محدد";
                let model = "غير محدد";
                const records = [];

                userSnapshot.forEach((expenseSnapshot) => {
                    const data = expenseSnapshot.val();
                    
                    // استخراج السيارة والموديل من أي سجل (نفترض أنها ثابتة للشخص)
                    if (data.car) car = data.car;
                    if (data.model) model = data.model;

                    records.push({
                        amount: parseFloat(data.amount) || 0,
                        liters: parseFloat(data.liters) || 0,
                        odometer: data.odometer || "غير محدد",
                        date: data.timestamp || "",
                        fuelName: data.fuelName || "غير محدد"
                    });
                });

                // ترتيب السجلات من الأحدث للأقدم
                records.sort((a, b) => new Date(b.date) - new Date(a.date));

                structuredData[userName] = {
                    car: car,
                    model: model,
                    records: records
                };
            });

            renderCards();
        });

        // دالة بناء ورسم البطاقات
        function renderCards() {
            const cardsGrid = document.getElementById('cardsGrid');
            const searchQuery = document.getElementById('searchBox').value.trim().toLowerCase();
            cardsGrid.innerHTML = "";

            let hasData = false;

            for (const userName in structuredData) {
                if (searchQuery && !userName.toLowerCase().includes(searchQuery)) {
                    continue;
                }

                hasData = true;
                const userData = structuredData[userName];
                const records = userData.records;
                
                // حساب الإجماليات
                const totalAmount = records.reduce((sum, item) => sum + item.amount, 0);
                const totalLiters = records.reduce((sum, item) => sum + item.liters, 0);

                // إنشاء كرت الشخص
                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col hover:shadow-md transition-shadow duration-200";

                let cardHtml = `
                    <div class="bg-gradient-to-br from-slate-800 to-slate-900 p-5 text-white">
                        <div class="flex justify-between items-start">
                            <div class="space-y-1">
                                <div class="flex items-center gap-2">
                                    <div class="w-8 h-8 rounded-full bg-indigo-500/20 border border-indigo-500/30 flex items-center justify-center text-indigo-300 text-sm">
                                        <i class="fa-solid fa-user"></i>
                                    </div>
                                    <span class="font-bold tracking-wide text-base">${userName}</span>
                                </div>
                                <div class="flex items-center gap-3 text-xs text-slate-300 mt-1">
                                    <span><i class="fa-solid fa-car"></i> ${userData.car}</span>
                                    <span><i class="fa-solid fa-tag"></i> ${userData.model}</span>
                                </div>
                            </div>
                            <div class="text-left">
                                <div class="text-xs text-slate-400 font-medium">إجمالي المصروف</div>
                                <span class="text-xl font-black text-emerald-400">${totalAmount.toFixed(2)} <span class="text-xs">ريال</span></span>
                            </div>
                        </div>
                        <div class="flex gap-6 mt-3 pt-3 border-t border-white/10">
                            <div>
                                <span class="text-xs text-slate-400 block">اللترات</span>
                                <span class="text-lg font-bold text-cyan-300">${totalLiters.toFixed(2)}</span>
                            </div>
                            <div>
                                <span class="text-xs text-slate-400 block">عدد التعبئات</span>
                                <span class="text-lg font-bold text-white">${records.length}</span>
                            </div>
                            <div>
                                <span class="text-xs text-slate-400 block">متوسط اللتر/تعبئة</span>
                                <span class="text-lg font-bold text-amber-300">${records.length ? (totalLiters / records.length).toFixed(2) : '0'}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="p-4 flex-1 overflow-y-auto max-h-[300px] space-y-3 bg-slate-50/50">
                        <p class="text-xxs font-bold text-slate-400 uppercase tracking-wider mb-1"><i class="fa-solid fa-history"></i> سجلات التعبئة (${records.length}):</p>
                `;

                // إضافة التسجيلات
                records.forEach(rec => {
                    const cleanDate = rec.date ? rec.date.replace('T', ' ') : 'غير محدد';
                    cardHtml += `
                        <div class="bg-white p-3 rounded-xl border border-slate-100 shadow-xxs flex justify-between items-center hover:border-slate-200 transition-colors">
                            <div class="space-y-1">
                                <div class="text-xs text-slate-400 font-semibold flex items-center gap-1">
                                    <i class="fa-regular fa-calendar text-slate-400"></i> ${cleanDate}
                                </div>
                                <div class="text-xs text-slate-500 font-medium flex items-center gap-2">
                                    ${rec.fuelName !== "غير محدد" ? `<span class="bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded-full">${rec.fuelName}</span>` : ''}
                                    ${rec.odometer !== "غير محدد" ? `<span><i class="fa-solid fa-gauge-high text-slate-300"></i> ${rec.odometer} كم</span>` : ''}
                                </div>
                            </div>
                            <div class="text-right">
                                <span class="font-bold text-slate-700 text-sm">${rec.amount.toFixed(2)}</span> <span class="text-xxs font-bold text-slate-400">ريال</span>
                                <div class="text-xs text-slate-400">${rec.liters.toFixed(2)} لتر</div>
                            </div>
                        </div>
                    `;
                });

                cardHtml += `</div>`;
                card.innerHTML = cardHtml;
                cardsGrid.appendChild(card);
            }

            if (!hasData) {
                cardsGrid.innerHTML = `
                    <div class="col-span-full text-center py-12 text-slate-400">
                        <i class="fa-solid fa-magnifying-glass text-2xl mb-2 block text-slate-300"></i> لا يوجد شخص بهذا الاسم في السجلات.
                    </div>`;
            }
        }
    </script>
</body>
</html>
